<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Placeholder screenshot for deployments</title>
  <desc id="desc">A placeholder image marking where the deployment history screenshot should be added.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#09090b" />
      <stop offset="100%" stop-color="#1f1b14" />
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)" />
  <rect x="90" y="90" width="1420" height="720" rx="28" fill="none" stroke="#a3e635" stroke-dasharray="18 14" stroke-width="6" />
  <text x="120" y="180" fill="#d4d4d8" font-family="Arial, Helvetica, sans-serif" font-size="30">Screenshot Placeholder</text>
  <text x="120" y="260" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="700">Manual deploy and deployment history</text>
  <text x="120" y="330" fill="#a1a1aa" font-family="Arial, Helvetica, sans-serif" font-size="30">Replace this image with the deployments panel.</text>
</svg>
